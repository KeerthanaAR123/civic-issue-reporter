<app-navbar></app-navbar>

<div class="min-h-screen bg-gray-100 py-8">
  <div class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="bg-white rounded-lg shadow-md p-8">
      <h1 class="text-3xl font-bold text-gray-900 mb-2">Report a Civic Issue</h1>
      <p class="text-gray-600 mb-8">Help improve your community by reporting issues</p>

      <form (ngSubmit)="onSubmit()" class="space-y-6">
        <div *ngIf="errorMessage" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded">
          {{ errorMessage }}
        </div>

        <div *ngIf="successMessage" class="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded">
          {{ successMessage }}
        </div>

        <!-- Title -->
        <div>
          <label for="title" class="block text-sm font-medium text-gray-700 mb-2">
            Issue Title <span class="text-red-500">*</span>
          </label>
          <input
            type="text"
            id="title"
            name="title"
            [(ngModel)]="issue.title"
            required
            maxlength="100"
            class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500"
            placeholder="Brief title of the issue"
          />
        </div>

        <!-- Description -->
        <div>
          <label for="description" class="block text-sm font-medium text-gray-700 mb-2">
            Description <span class="text-red-500">*</span>
          </label>
          <textarea
            id="description"
            name="description"
            [(ngModel)]="issue.description"
            required
            maxlength="1000"
            rows="5"
            class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500"
            placeholder="Provide detailed description of the issue"
          ></textarea>
          <p class="mt-1 text-sm text-gray-500">{{ issue.description.length }}/1000 characters</p>
        </div>

        <!-- Category -->
        <div>
          <label for="category" class="block text-sm font-medium text-gray-700 mb-2">
            Category <span class="text-red-500">*</span>
          </label>
          <select
            id="category"
            name="category"
            [(ngModel)]="issue.category"
            required
            class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500"
          >
            <option *ngFor="let cat of categories" [value]="cat">{{ cat }}</option>
          </select>
        </div>

        <!-- Subcategory (optional, depends on category) -->
        <div *ngIf="currentSubCategories.length > 0">
          <label for="subCategory" class="block text-sm font-medium text-gray-700 mb-2">
            Subcategory
          </label>
          <select
            id="subCategory"
            name="subCategory"
            [(ngModel)]="issue.subCategory"
            class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500"
          >
            <option value="">Select subcategory</option>
            <option *ngFor="let sub of currentSubCategories" [value]="sub">{{ sub }}</option>
          </select>
        </div>

        <!-- Location (human-readable address) -->
        <div>
          <label for="location" class="block text-sm font-medium text-gray-700 mb-2">
            Location <span class="text-red-500">*</span>
          </label>
          <input
            type="text"
            id="location"
            name="location"
            [(ngModel)]="issue.location"
            required
            class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500"
            placeholder="Street address, area, or landmark"
          />
          <p class="mt-1 text-sm text-gray-500">
            You can also use your current GPS location below.
          </p>
        </div>

        <!-- GPS controls -->
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 items-end">
          <div>
            <label for="latitude" class="block text-sm font-medium text-gray-700 mb-2">
              Latitude
            </label>
            <input
              type="number"
              id="latitude"
              name="latitude"
              [(ngModel)]="issue.latitude"
              step="any"
              class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500"
              placeholder="Lat"
            />
          </div>

          <div>
            <label for="longitude" class="block text-sm font-medium text-gray-700 mb-2">
              Longitude
            </label>
            <input
              type="number"
              id="longitude"
              name="longitude"
              [(ngModel)]="issue.longitude"
              step="any"
              class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500"
              placeholder="Lng"
            />
          </div>

          <div class="mt-2 sm:mt-0">
            <button
              type="button"
              (click)="useCurrentLocation()"
              class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 px-4 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500"
            >
              Use Current Location
            </button>
          </div>
        </div>

        <!-- Priority -->
        <div>
          <label for="priority" class="block text-sm font-medium text-gray-700 mb-2">
            Priority <span class="text-red-500">*</span>
          </label>
          <select
            id="priority"
            name="priority"
            [(ngModel)]="issue.priority"
            required
            class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500"
          >
            <option *ngFor="let p of priorities" [value]="p">{{ p }}</option>
          </select>
        </div>

        <!-- (Optional) Department, if you decide to expose department selection later
        <div>
          <label for="departmentId" class="block text-sm font-medium text-gray-700 mb-2">
            Department
          </label>
          <input
            type="text"
            id="departmentId"
            name="departmentId"
            [(ngModel)]="issue.departmentId"
            class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500"
            placeholder="Department ID (optional)"
          />
        </div>
        -->

        <div class="flex space-x-4">
          <button
            type="submit"
            [disabled]="isLoading"
            class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-4 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 disabled:opacity-50"
          >
            {{ isLoading ? 'Submitting...' : 'Submit Issue' }}
          </button>
          <button
            type="button"
            (click)="router.navigate(['/dashboard'])"
            class="flex-1 bg-gray-300 hover:bg-gray-400 text-gray-800 font-medium py-2 px-4 rounded-md focus:outline-none focus:ring-2 focus:ring-gray-500"
          >
            Cancel
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
